!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collage</title>
    <style>
        body {
            margin: 0;
            padding: auto;
            font-family: Arial, sans-serif;
            background-color: black;
            background-size: cover;
            background-position: center;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        #collage {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 200px;
            gap: 10px;
            max-width: 960px;
            margin: 0 auto;
        }

        #collage img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 10px;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        #img1 {
            grid-column: span 2;
            grid-row: span 2;
        }

        #collage img:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
            box-shadow: 0 8px 20px hsl(194, 100%, 50%);
        }
    </style>
</head>
<body>
    <h1>Collage de Meme</h1>
    <div id="collage">
        <img id="img1" src="https://i.redd.it/tesla-and-einstein-meme-but-medic-and-engi-v0-7lv98092z2ub1.jpg?width=716&format=pjpg&auto=webp&s=8d478081aedd7861e92e7e0f2b53ada3c3f14dd5" alt="Collage 1">
        <img src="https://i.redd.it/tesla-and-einstein-meme-but-medic-and-engi-v0-7lv98092z2ub1.jpg?width=716&format=pjpg&auto=webp&s=8d478081aedd7861e92e7e0f2b53ada3c3f14dd5" alt="Collage 2">
        <img src="https://i.redd.it/tesla-and-einstein-meme-but-medic-and-engi-v0-7lv98092z2ub1.jpg?width=716&format=pjpg&auto=webp&s=8d478081aedd7861e92e7e0f2b53ada3c3f14dd5" alt="Collage 3">
        <img src="https://i.redd.it/tesla-and-einstein-meme-but-medic-and-engi-v0-7lv98092z2ub1.jpg?width=716&format=pjpg&auto=webp&s=8d478081aedd7861e92e7e0f2b53ada3c3f14dd5" alt="Collage 4">
